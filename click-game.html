<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クリックゲーム</title>
    <style>
        .emerald-button {
            display: inline-block;
            background-color: #50C878;
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 3px 5px 0 #3a965a;
            cursor: pointer;
            border: none;
            transition: 0.1s;
            user-select: none;
        }
        .emerald-button:active {
            box-shadow: none;
            transform: translate(3px, 5px);
        }
        .counter-display {
            margin-top: 20px;
            font-family: 'Arial Black', sans-serif;
            font-size: 50px;
            color: black;
        }
        #special-msg {
            height: 30px;
            color: #ff5722;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }
        #secret-btn {
            display: none;
            position: absolute;
            right: 0; 
            bottom: 0; 
            width: 10px;
            height: 10px;
            background-color: transparent;
            border: 1px solid rgba(0,0,0,0.05); 
            color: transparent; 
            cursor: pointer;
            z-index: 10;
        }
        @keyframes rainbow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .rainbow-active {
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 1800% 1800%;
            animation: rainbow-bg 18s ease infinite;
        }

        .stats-box {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            display: inline-block;
        }
        /* カスタムツールチップのスタイル */
        .custom-tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            white-space: nowrap;
        }
        .graph-bar {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .graph-bar:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div style="position: relative; text-align: center; padding: 30px 30px 1000px 30px;">
    <h1 style="text-align: center;">クリックゲーム</h1>
    
    <button style="background-color:red; color:white; border-radius:5px; cursor:pointer;" onclick="resetCount()">リセット</button>

    <button style="background-color: #6c757d; color: white; border-radius: 5px; cursor: pointer; margin-left: 10px;" onclick="goHome()">
    ホームに戻る
    </button>

    <div id="count-num" class="counter-display">0</div>
    
    <button type="button" class="emerald-button" onclick="countUp()">
        押す
    </button>

    <div id="special-msg"></div>

    <div class="stats-box">
        <h3>🔥 連続記録: <span id="streak-count">0</span>日</h3>
        <div id="graph-container" style="display: flex; align-items: flex-end; height: 120px; gap: 8px; border-bottom: 2px solid #333; padding: 10px; justify-content: center;"></div>
        <p style="font-size: 12px;">直近7日間の最高スコア</p>
    </div>

    <br>
    <button id="rainbow-toggle-btn" style="display: none; margin-top: 10px; padding: 10px 20px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc;" onclick="toggleRainbow()">
    🌈 背景の虹色をON/OFFする
    </button>

    <button id="secret-btn" onclick="secretPower()">？</button>
</div>

<div id="tooltip" class="custom-tooltip"></div>

<script>
    let savedCount = localStorage.getItem('myClickCount');
    let count = savedCount ? parseInt(savedCount) : 0;

    window.onload = function() {
        initStats();
        updateDisplay();
    };

    function countUp() {
        count = count + 1; 
        localStorage.setItem('myClickCount', count);
        updateDisplay();
        
        if (count === 100) {
            updateStreak();
        } else if (count > 100) {
            saveScore(count);
        }
    }

    function resetCount() {
        if (confirm("リセットしますか？")) {
            localStorage.clear();
            location.reload();
        }
    }

    function updateDisplay() {
        const numDisplay = document.getElementById('count-num');
        const msgArea = document.getElementById('special-msg');
        const secretBtn = document.getElementById('secret-btn');
        const toggleBtn = document.getElementById('rainbow-toggle-btn');
        numDisplay.innerHTML = count;

        if (count >= 1000000) {
            msgArea.innerHTML = "1000000回達成！ゲームクリア！\nこの後もクリックした回数は増え続けます。";
            numDisplay.style.color = "gold";
            document.body.classList.add('rainbow-active');
            toggleBtn.style.display = "inline-block";
        } else if (count >= 100000) {
            msgArea.innerHTML = "100000回達成！";
            numDisplay.style.color = "blue";
        } else if (count >= 10000) {
            msgArea.innerHTML = "10000回達成！";
            numDisplay.style.color = "green";
            secretBtn.style.display = "block";
        } else if (count >= 1000) {
            msgArea.innerHTML = "1000回達成！";
            numDisplay.style.color = "yellow";
        } else if (count >= 100) {
            msgArea.innerHTML = "100回達成！";
            numDisplay.style.color = "orange";
        } else if (count >= 10) {
            msgArea.innerHTML = "10回達成！";
            numDisplay.style.color = "red";
        } 
    } 

    function secretPower() {
        alert("よく見つけましたね\n隠しボタンです");
    }

    let isKeyPressed = false;
    window.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            if (!isKeyPressed) {
                countUp();
                isKeyPressed = true;
            }
        }
    });
    window.addEventListener('keyup', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
            isKeyPressed = false;
        }
    });

    function toggleRainbow() {
        document.body.classList.toggle('rainbow-active');
    }
    function goHome() {
        location.href = "index.html";
    }

    function initStats() {
        const lastDate = localStorage.getItem('last_play_date');
        let streak = parseInt(localStorage.getItem('click_streak') || "0");
        if (lastDate) {
            const today = new Date();
            const last = new Date(lastDate);
            today.setHours(0, 0, 0, 0);
            last.setHours(0, 0, 0, 0);
            if ((today - last) / (1000 * 60 * 60 * 24) > 1) {
                streak = 0;
                localStorage.setItem('click_streak', "0");
            }
        }
        document.getElementById('streak-count').innerText = streak;
        displayGraph();
    }

    function updateStreak() {
        const todayStr = new Date().toLocaleDateString();
        const lastDate = localStorage.getItem('last_play_date');
        let streak = parseInt(localStorage.getItem('click_streak') || "0");

        if (lastDate !== todayStr) {
            streak++;
            localStorage.setItem('click_streak', streak);
            localStorage.setItem('last_play_date', todayStr);
            document.getElementById('streak-count').innerText = streak;
            alert("100回達成！連続記録更新！");
        }
        saveScore(count);
    }

    function saveScore(score) {
        const todayStr = new Date().toLocaleDateString();
        let history = JSON.parse(localStorage.getItem('click_history') || "[]");
        const todayIdx = history.findIndex(i => i.date === todayStr);
        if (todayIdx > -1) {
            if (score > history[todayIdx].score) history[todayIdx].score = score;
        } else {
            history.push({ date: todayStr, score: score });
        }
        if (history.length > 7) history.shift();
        localStorage.setItem('click_history', JSON.stringify(history));
        displayGraph();
    }

    function displayGraph() {
        const history = JSON.parse(localStorage.getItem('click_history') || "[]");
        const container = document.getElementById('graph-container');
        container.innerHTML = ''; 
        const tooltip = document.getElementById('tooltip');

        history.forEach(data => {
            const column = document.createElement('div');
            column.style.display = 'flex';
            column.style.flexDirection = 'column';
            column.style.alignItems = 'center';
            column.style.gap = '5px';

            const bar = document.createElement('div');
            const barHeight = Math.min(data.score, 120); 
            bar.style.width = '25px';
            bar.style.height = barHeight + 'px';
            bar.style.backgroundColor = data.score >= 100 ? '#50C878' : '#ccc';
            bar.style.borderRadius = '3px 3px 0 0';
            bar.classList.add('graph-bar'); 

            bar.addEventListener('mouseover', function(e) {
                tooltip.innerText = data.date + ": " + data.score + "回";
                tooltip.style.display = 'block';
            });

            bar.addEventListener('mousemove', function(e) {
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
            });

            bar.addEventListener('mouseout', function() {
                tooltip.style.display = 'none';
            });

            const dateText = document.createElement('div');
            const shortDate = data.date.split('/').slice(1).join('/'); 
            dateText.innerText = shortDate;
            dateText.style.fontSize = '10px';
            dateText.style.color = '#666';

            column.appendChild(bar);
            column.appendChild(dateText);
            container.appendChild(column);
        });
    }
</script>
</body>
</html>
