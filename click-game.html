<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クリックゲーム - v3.2.2</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            transition: background 0.5s;
        }
        .container {
            position: relative;
            text-align: center;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
        }
        .emerald-button {
            display: inline-block;
            background-color: #50C878;
            color: white;
            padding: 25px 50px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 3px 5px 0 #3a965a;
            cursor: pointer;
            border: none;
            transition: 0.1s;
            user-select: none;
            margin: 20px 0;
        }
        .emerald-button:active {
            box-shadow: none;
            transform: translate(4px, 6px);
        }
        .display-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .counter-display {
            font-family: 'Arial Black', sans-serif;
            font-size: 48px;
            color: black;
            line-height: 1;
            margin-bottom: 15px;
        }
        .today-display {
            font-family: 'Arial Black', sans-serif;
            font-size: 32px;
            color: #50C878;
        }
        #special-msg {
            height: 30px;
            color: #ff5722;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }
        .stats-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        #graph-container {
            display: flex;
            align-items: flex-end;
            height: 120px;
            gap: 12px;
            border-bottom: 2px solid #333;
            padding: 10px 20px;
            justify-content: flex-end;
            overflow-x: auto;
        }
        .graph-bar {
            cursor: pointer;
            transition: opacity 0.2s, height 0.3s;
        }
        .custom-tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .history-table th, .history-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .history-table th { background-color: #f2f2f2; }
        .details-container { margin-top: 20px; }
        .small-btn {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin: 0 5px;
            color: white;
        }
        .reset-btn { background-color: red; }
        .home-btn { background-color: #6c757d; }
        .dl-btn { background-color: #2196F3; font-weight: bold; margin-top: 10px; padding: 10px 20px; }
        @keyframes rainbow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .rainbow-active {
            background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
            background-size: 1800% 1800%;
            animation: rainbow-bg 18s ease infinite;
        }
        #secret-btn {
            display: none;
            position: absolute;
            right: 0; 
            bottom: 0; 
            width: 10px;
            height: 10px;
            background-color: transparent;
            border: 1px solid rgba(0,0,0,0.05); 
            color: transparent; 
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>クリックゲーム</h1>
    <a>1日100回クリックすると、連続記録が更新されます。</a>
    <div style="margin-bottom: 20px;">
        <button class="small-btn reset-btn" onclick="resetCount()">リセット</button>
        <button class="small-btn home-btn" onclick="goHome()">ホームに戻る</button>
    </div>
    <div class="display-container">
        <div class="label">累計クリック</div>
        <div id="count-num" class="counter-display">0</div>
        <div class="label">今日のクリック</div>
        <div id="today-num" class="today-display">0</div>
    </div>
    <button type="button" class="emerald-button" onclick="countUp()">押す</button>
    <div id="special-msg"></div>
    <div class="stats-box">
        <h3>🔥 連続記録: <span id="streak-count">0</span>日</h3>
        <div id="graph-container"></div>
        <p style="font-size: 12px;">直近7日間の最高スコア</p>
    </div>
    <div class="details-container">
        <details>
            <summary style="cursor: pointer; color: #50C878; font-weight: bold; margin-bottom:10px;">📊 全履歴を表示</summary>
            <p>履歴は1年ごとにリセットされます。保存したい場合は下のボタンを押してください</p>
            <button class="small-btn dl-btn" onclick="downloadCSV()">履歴をCSVで保存する</button>
            <div id="full-history-list"></div>
        </details>
    </div>
    <br>
    <button id="rainbow-toggle-btn" class="small-btn home-btn" style="display:none;" onclick="toggleRainbow()">🌈 背景の虹色をON/OFFする</button>
    <button id="secret-btn" onclick="secretPower()">？</button>
</div>
<div id="tooltip" class="custom-tooltip"></div>

<script>
    let savedCount = localStorage.getItem('myClickCount');
    let count = savedCount ? parseInt(savedCount) : 0;
    let todaySessionCount = 0; 

    window.onload = function() {
        initStats();
        updateDisplay();
    };

    function countUp() {
        count = count + 1; 
        todaySessionCount = todaySessionCount + 1; 
        localStorage.setItem('myClickCount', count);
        localStorage.setItem('todaySessionCount', todaySessionCount);
        updateDisplay();
        if (todaySessionCount === 100) {
            updateStreak();
        } else if (todaySessionCount > 100) {
            saveScore(todaySessionCount);
        }
    }

    function resetCount() {
        if (confirm("リセットしますか？")) {
            localStorage.clear();
            location.reload();
        }
    }

    function updateDisplay() {
        const numDisplay = document.getElementById('count-num');
        const todayDisplay = document.getElementById('today-num');
        const msgArea = document.getElementById('special-msg');
        const secretBtn = document.getElementById('secret-btn');
        const toggleBtn = document.getElementById('rainbow-toggle-btn');
        numDisplay.innerHTML = count;
        todayDisplay.innerHTML = todaySessionCount;
        if (count >= 1000000) {
            msgArea.innerHTML = "1000000回達成！ゲームクリア！\nこの後もクリックした回数は増え続けます。";
            numDisplay.style.color = "gold";
            document.body.classList.add('rainbow-active');
            toggleBtn.style.display = "inline-block";
        } else if (count >= 100000) {
            msgArea.innerHTML = "100000回達成！";
            numDisplay.style.color = "blue";
        } else if (count >= 10000) {
            msgArea.innerHTML = "10000回達成！";
            numDisplay.style.color = "green";
            secretBtn.style.display = "block";
        } else if (count >= 1000) {
            msgArea.innerHTML = "1000回達成！";
            numDisplay.style.color = "yellow";
        } else if (count >= 100) {
            msgArea.innerHTML = "100回達成！";
            numDisplay.style.color = "orange";
        } else if (count >= 10) {
            msgArea.innerHTML = "10回達成！";
            numDisplay.style.color = "red";
        } 
    } 

    function secretPower() {
        alert("よく見つけましたね\n隠しボタンです");
    }

    let isKeyPressed = false;
    window.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            if (!isKeyPressed) {
                countUp();
                isKeyPressed = true;
            }
        }
    });
    window.addEventListener('keyup', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
            isKeyPressed = false;
        }
    });

    function toggleRainbow() { document.body.classList.toggle('rainbow-active'); }
    function goHome() { location.href = "index.html"; }

    function initStats() {
        const todayStr = new Date().toLocaleDateString();
        const lastDate = localStorage.getItem('last_play_date');
        let streak = parseInt(localStorage.getItem('click_streak') || "0");
        
        let savedTodayCount = localStorage.getItem('todaySessionCount');
        if (lastDate === todayStr) {
            todaySessionCount = savedTodayCount ? parseInt(savedTodayCount) : 0;
        } else {
            todaySessionCount = 0;
            localStorage.setItem('todaySessionCount', "0");
            
            if (lastDate) {
                const today = new Date();
                const last = new Date(lastDate);
                today.setHours(0, 0, 0, 0);
                last.setHours(0, 0, 0, 0);
                if ((today - last) / (1000 * 60 * 60 * 24) > 1) {
                    streak = 0;
                    localStorage.setItem('click_streak', "0");
                }
            }
        }
        
        document.getElementById('streak-count').innerText = streak;
        displayGraph();
    }

    function updateStreak() {
        const todayStr = new Date().toLocaleDateString();
        const lastDate = localStorage.getItem('last_play_date');
        let streak = parseInt(localStorage.getItem('click_streak') || "0");
        if (lastDate !== todayStr) {
            streak++;
            localStorage.setItem('click_streak', streak);
            localStorage.setItem('last_play_date', todayStr);
            document.getElementById('streak-count').innerText = streak;
            alert("100回達成！連続記録更新！");
        }
        saveScore(todaySessionCount);
    }

    function saveScore(score) {
        const todayStr = new Date().toLocaleDateString();
        let history = JSON.parse(localStorage.getItem('click_history') || "[]");
        const todayIdx = history.findIndex(i => i.date === todayStr);
        if (todayIdx > -1) {
            if (score > history[todayIdx].score) history[todayIdx].score = score;
        } else {
            history.push({ date: todayStr, score: score });
        }
        if (history.length > 365) history.shift();
        localStorage.setItem('click_history', JSON.stringify(history));
        displayGraph();
    }

    function displayGraph() {
        const history = JSON.parse(localStorage.getItem('click_history') || "[]");
        const container = document.getElementById('graph-container');
        const historyList = document.getElementById('full-history-list');
        const tooltip = document.getElementById('tooltip');
        container.innerHTML = '';
        historyList.innerHTML = '';

        let recentHistory = history.slice(-7); 
        while (recentHistory.length < 7) {
            recentHistory.unshift({ date: "", score: -1 });
        }

        let maxScore = 0;
        recentHistory.forEach(data => { if (data.score > maxScore) maxScore = data.score; });
        if (maxScore < 100) maxScore = 100;

        recentHistory.forEach(data => {
            const column = document.createElement('div');
            column.style.cssText = "display:flex; flex-direction:column; align-items:center; gap:5px;";
            
            if (data.score === -1) {
                column.style.width = "25px";
                container.appendChild(column);
                return;
            }

            const bar = document.createElement('div');
            const barHeight = Math.min((data.score / maxScore) * 110, 110);
            bar.style.cssText = `width:25px; height:${barHeight}px; border-radius:3px 3px 0 0;`;
            bar.style.backgroundColor = data.score >= 100 ? '#50C878' : '#ccc';
            bar.className = "graph-bar";
            bar.onmouseover = (e) => {
                tooltip.innerText = data.date + ": " + data.score + "回";
                tooltip.style.display = 'block';
            };
            bar.onmousemove = (e) => {
                tooltip.style.left = (e.pageX + 15) + 'px';
                tooltip.style.top = (e.pageY + 15) + 'px';
            };
            bar.onmouseout = () => { tooltip.style.display = 'none'; };
            const dateText = document.createElement('div');
            dateText.innerText = data.date.split('/').slice(1).join('/');
            dateText.style.fontSize = '10px';
            column.appendChild(bar);
            column.appendChild(dateText);
            container.appendChild(column);
        });
        if (history.length > 0) {
            const table = document.createElement('table');
            table.className = "history-table";
            table.innerHTML = `<thead><tr><th>日付</th><th>回数</th></tr></thead><tbody>` + 
                history.map(item => `<tr><td>${item.date}</td><td>${item.score}回</td></tr>`).reverse().join('') + 
                `</tbody>`;
            historyList.appendChild(table);
        }
    }

    function downloadCSV() {
        const history = JSON.parse(localStorage.getItem('click_history') || "[]");
        if (history.length === 0) {
            alert("保存する履歴がありません。");
            return;
        }
        let csvContent = "日付,クリック回数\n";
        history.forEach(item => { csvContent += item.date + "," + item.score + "\n"; });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "click_history_report.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
